<meta name="apple-mobile-web-app-title" content="קניות">

<title>🛒 רשימת קניות</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  background-image:url("bg.jpg");
  background-size:cover;background-position:center;background-attachment:fixed;
  font-family:Heebo,sans-serif;direction:rtl;color:#1b5e20;min-height:100vh;padding-bottom:80px

body::before{content:'';position:fixed;inset:0;background:rgba(255,255,255,0.85);z-index:0;pointer-events:none}
#hdr{background:linear-gradient(135deg,#2e7d32,#1b5e20);padding:12px 16px;
  position:sticky;top:0;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.2)}
#hdr h1{color:#fff;font-size:20px;font-weight:900;margin-bottom:8px;display:flex;align-items:center;gap:8px}
#hdr h1 img{height:36px;width:36px;object-fit:cover;border-radius:50%;border:2px solid rgba(255,255,255,.4)}
#search{width:100%;padding:8px 14px;border-radius:20px;border:none;font-family:Heebo;font-size:15px;background:rgba(255,255,255,.15);color:#fff;outline:none}
#search::placeholder{color:rgba(255,255,255,.6)}
#stats{background:#fff;padding:10px 16px;display:flex;gap:10px;align-items:center;
  border-bottom:1px solid #c8e6c9;flex-wrap:wrap;position:sticky;top:80px;z-index:98}
.stat{font-size:13px;font-weight:600;color:#388e3c}
.stat span{font-size:15px;font-weight:900;color:#1b5e20}
#show-cart-btn{margin-right:auto;background:#2e7d32;color:#fff;border:none;
  border-radius:20px;padding:6px 14px;font-family:Heebo;font-size:13px;font-weight:700;cursor:pointer}
#show-cart-btn.active{background:#f44336}
#sec-filter{padding:8px 14px;display:flex;gap:6px;overflow-x:auto;
  background:#fff;border-bottom:1px solid #c8e6c9;position:sticky;top:132px;z-index:97}
#sec-filter::-webkit-scrollbar{display:none}
.sf-btn{background:#e8f5e9;border:1.5px solid #a5d6a7;color:#2e7d32;
  border-radius:20px;padding:4px 10px;font-family:Heebo;font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;flex-shrink:0}
.sf-btn.active,.sf-btn:hover{background:#2e7d32;color:#fff;border-color:#1b5e20}
#list,#cart-view{padding:12px 14px;display:grid;gap:10px;position:relative;z-index:1}
#cart-view{display:none}
#list.hide{display:none}
#cart-view.show{display:grid}
.section-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sec-header{padding:10px 16px;background:#e8f5e9;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;border-bottom:1px solid #c8e6c9}
.sec-title{font-size:14px;font-weight:900;color:#1b5e20;display:flex;align-items:center;gap:6px}
.sec-count{font-size:12px;color:#388e3c;font-weight:600}
.sec-check-all{background:#2e7d32;color:#fff;border:none;border-radius:10px;
  padding:3px 10px;font-family:Heebo;font-size:11px;font-weight:700;cursor:pointer}
.items-list{padding:4px 0}
.item{display:flex;align-items:center;padding:9px 14px;gap:10px;
  border-bottom:1px solid #f1f8e9;transition:background .15s}
.item:last-child{border-bottom:none}
.item:hover{background:#f9fbe7}
.item.checked{background:#f1f8e9}
.item.checked .item-name{text-decoration:line-through;color:#81c784}
.item.collected{background:#e8f5fe}
.item.checked.collected{background:#e8ffe8}
.cb{width:22px;height:22px;border-radius:6px;border:2px solid #a5d6a7;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:#fff;cursor:pointer;transition:all .15s}
.item.checked .cb{background:#2e7d32;border-color:#2e7d32}
.cb::after{content:'✓';color:#fff;font-size:13px;font-weight:900;display:none}
.item.checked .cb::after{display:block}
.item-name{font-size:14px;font-weight:600;flex:1;line-height:1.3;cursor:pointer}
.item-actions{display:flex;gap:4px;align-items:center;flex-shrink:0}
.collect-btn{width:30px;height:30px;border-radius:50%;border:2px solid #b2ebf2;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;
  color:#0097a7;background:#fff;cursor:pointer;transition:all .15s}
.collect-btn.done{background:#0097a7;border-color:#0097a7;color:#fff}
.edit-btn,.del-btn{width:26px;height:26px;border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;font-size:12px;
  cursor:pointer;transition:all .15s;background:transparent;color:#aaa}
.edit-btn:hover{background:#fff9c4;color:#f57f17}
.del-btn:hover{background:#ffebee;color:#f44336}
.cart-section{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.cart-sec-title{padding:10px 16px;background:#e8f5e9;font-size:14px;font-weight:900;color:#1b5e20}
.cart-item{padding:10px 14px;border-bottom:1px solid #f1f8e9;font-size:14px;
  font-weight:600;display:flex;align-items:center;gap:8px}
.cart-item:last-child{border-bottom:none}
.cart-item.collected-item{background:#e3f2fd}
.cart-item .ci-dot{width:8px;height:8px;border-radius:50%;background:#a5d6a7;flex-shrink:0}
.cart-item.collected-item .ci-dot{background:#0097a7}
#bottom{position:fixed;bottom:0;right:0;left:0;background:#fff;
  padding:10px 16px;display:flex;gap:6px;border-top:1px solid #c8e6c9;
  box-shadow:0 -2px 8px rgba(0,0,0,.08);z-index:99}
.bot-btn{flex:1;padding:10px;border:none;border-radius:10px;font-family:Heebo;
  font-size:13px;font-weight:700;cursor:pointer}
#btn-add{background:#e8f5e9;color:#1b5e20}
#btn-clear{background:#ffebee;color:#c62828}
#btn-reset{background:#f3e5f5;color:#6a1b9a}
#btn-share{background:#2e7d32;color:#fff}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:20px;padding:24px;max-width:340px;
  width:90%;direction:rtl}
.modal-title{font-size:17px;font-weight:900;color:#1b5e20;margin-bottom:16px}
.modal-label{font-size:12px;font-weight:700;color:#388e3c;display:block;margin-bottom:4px}
.modal-input{width:100%;padding:10px 14px;border:2px solid #c8e6c9;border-radius:10px;
  font-family:Heebo;font-size:15px;direction:rtl;outline:none;margin-bottom:12px}
.modal-input:focus{border-color:#2e7d32}
.modal-select{width:100%;padding:10px 14px;border:2px solid #c8e6c9;border-radius:10px;
  font-family:Heebo;font-size:14px;direction:rtl;outline:none;background:#fff;margin-bottom:20px}
.modal-btns{display:flex;gap:8px}
.modal-cancel{flex:1;padding:11px;border:2px solid #c8e6c9;border-radius:10px;
  background:#fff;font-family:Heebo;font-size:14px;font-weight:700;color:#388e3c;cursor:pointer}
.modal-ok{flex:2;padding:11px;border:none;border-radius:10px;background:#2e7d32;
  color:#fff;font-family:Heebo;font-size:14px;font-weight:700;cursor:pointer}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);
  background:#1a3a1a;color:#fff;padding:10px 22px;border-radius:28px;font-weight:700;
  font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.2);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

<div id="hdr">

    <img src="bg.jpg" alt="">

</div>

<div id="stats">

  <button id="show-cart-btn" onclick="toggleCart()">🛒 עגלה</button>
</div>

<div id="sec-filter">

  <button class="sf-btn" onclick="filterSec(0)" data-sec="0">🧴 ניקוי</button>

  <button class="sf-btn" onclick="filterSec(5)" data-sec="5">🌾 יבשים</button>
  <button class="sf-btn" onclick="filterSec(6)" data-sec="6">🧀 חלב</button>

  <button class="sf-btn" onclick="filterSec(8)" data-sec="8">🍞 לחם</button>
  <button class="sf-btn" onclick="filterSec(9)" data-sec="9">⭐ מיוחד</button>
  <button class="sf-btn" onclick="filterSec(10)" data-sec="10">🛒 כללי</button>
</div>

<div id="list"></div>
<div id="cart-view"></div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal-box">
    <div class="modal-title">➕ הוסף מוצר חדש</div>
    <label class="modal-label">שם המוצר</label>
    <input type="text" class="modal-input" id="new-name" placeholder="לדוגמה: ריבת תות">
    <label class="modal-label">מחלקה</label>
    <select class="modal-select" id="new-sec">
      <option value="0">🧴 ניקוי ורטבים</option>
      <option value="1">🥦 ירקות ופירות</option>
      <option value="2">🥩 בשר ודגים</option>
      <option value="3">🥤 שתיה</option>
      <option value="4">🥫 שימורים</option>
      <option value="5" selected>🌾 יבשים ומתוקים</option>
      <option value="6">🧀 חלב וחטיפים</option>
      <option value="7">🧻 ניקיון וצרכים</option>
      <option value="8">🍞 לחמים</option>
      <option value="9">⭐ מיוחד</option>
      <option value="10">🛒 כללי</option>
    </select>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('add-modal')">ביטול</button>
      <button class="modal-ok" onclick="confirmAdd()">➕ הוסף</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal-box">
    <div class="modal-title">✏️ עריכת מוצר</div>

    <label class="modal-label">מחלקה</label>

      <option value="2">🥩 בשר ודגים</option>
      <option value="3">🥤 שתיה</option>
      <option value="4">🥫 שימורים</option>
      <option value="5">🌾 יבשים ומתוקים</option>
      <option value="6">🧀 חלב וחטיפים</option>
      <option value="7">🧻 ניקיון וצרכים</option>
      <option value="8">🍞 לחמים</option>
      <option value="9">⭐ מיוחד</option>
      <option value="10">🛒 כללי</option>
    </select>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('edit-modal')">ביטול</button>
      <button class="modal-ok" onclick="confirmEdit()">💾 שמור</button>
    </div>
  </div>
</div>

<div id="bottom">
  <button class="bot-btn" id="btn-add" onclick="openModal('add-modal')">➕ הוסף</button>
  <button class="bot-btn" id="btn-clear" onclick="clearAll()">🗑️ נקה</button>
  <button class="bot-btn" id="btn-reset" onclick="resetAll()">↺ אפס</button>
  <button class="bot-btn" id="btn-share" onclick="shareList()">📤 שתף</button>
</div>

<div id="toast"></div>

let items = JSON.parse(localStorage.getItem('shopping_v3')||'null') || ALL_ITEMS.map(i=>({...i}));
items.forEach(i=>{ if(!i.collected) i.collected=false; });

let activeSec = -1;
let cartMode = false;
let editIdx = -1;

function save() { localStorage.setItem('shopping_v3', JSON.stringify(items)); }

// ── TOGGLE SELECTED ────────────────────────────────────────────
function toggle(idx) {
  items[idx].checked = !items[idx].checked;
  save(); render();
}

// ── TOGGLE COLLECTED ───────────────────────────────────────────
function toggleCollect(idx) {
  items[idx].collected = !items[idx].collected;
  save(); render();
}

// ── DELETE ─────────────────────────────────────────────────────
function deleteItem(idx) {
  const name = items[idx].name;
  items.splice(idx, 1);
  save(); render();
  toast('🗑️ ' + name + ' הוסר');
}

// ── EDIT ───────────────────────────────────────────────────────
function openEdit(idx) {
  editIdx = idx;
  document.getElementById('edit-name').value = items[idx].name;
  document.getElementById('edit-sec').value = items[idx].sec;
  openModal('edit-modal');
}
function confirmEdit() {
  const name = document.getElementById('edit-name').value.trim();
  if(!name) return;
  items[editIdx].name = name;
  items[editIdx].sec = +document.getElementById('edit-sec').value;
  save(); closeModal('edit-modal'); render();
  toast('✅ עודכן');
}

// ── ADD ────────────────────────────────────────────────────────
function confirmAdd() {
  const name = document.getElementById('new-name').value.trim();
  if(!name) { document.getElementById('new-name').style.borderColor='#f44336'; return; }
  const sec = +document.getElementById('new-sec').value;
  items.push({sec, name, checked:true, collected:false, custom:true});
  save(); closeModal('add-modal');
  activeSec = sec;
  document.querySelectorAll('.sf-btn').forEach(b=>b.classList.toggle('active',+b.dataset.sec===sec));
  render();
  toast('✅ ' + name + ' נוסף!');
}

// ── MODALS ─────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('open');
  if(id==='add-modal') {
    document.getElementById('new-name').value='';
    setTimeout(()=>document.getElementById('new-name').focus(),100);
  }
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// ── FILTER ─────────────────────────────────────────────────────
function filterSec(sec) {
  activeSec = sec;
  document.querySelectorAll('.sf-btn').forEach(b=>b.classList.toggle('active',+b.dataset.sec===sec));
  render();
}

// ── CHECK ALL IN SECTION ───────────────────────────────────────
function checkAllSec(sec) {
  const visible = items.filter(i=>i.sec===sec);
  const allChecked = visible.every(i=>i.checked);
  items.forEach((item,i)=>{ if(item.sec===sec) items[i].checked=!allChecked; });
  save(); render();
}

// ── TOGGLE CART VIEW ───────────────────────────────────────────
function toggleCart() {
  cartMode = !cartMode;
  const btn = document.getElementById('show-cart-btn');
  btn.textContent = cartMode ? '📋 רשימה' : '🛒 עגלה';
  btn.classList.toggle('active', cartMode);
  document.getElementById('list').classList.toggle('hide', cartMode);
  document.getElementById('cart-view').classList.toggle('show', cartMode);
  if(cartMode) renderCart();
}

// ── RENDER LIST ────────────────────────────────────────────────
function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const listEl = document.getElementById('list');

  const secs = {};
  items.forEach((item,idx) => {
    if(activeSec !== -1 && item.sec !== activeSec) return;
    if(q && !item.name.toLowerCase().includes(q)) return;
    if(!secs[item.sec]) secs[item.sec] = [];
    secs[item.sec].push({...item, idx});
  });

  listEl.innerHTML = '';
  Object.keys(secs).sort((a,b)=>+a-+b).forEach(sec => {
    const secItems = secs[sec];
    const checkedCount = secItems.filter(i=>i.checked).length;
    const collectedCount = secItems.filter(i=>i.collected).length;
    const div = document.createElement('div');
    div.className = 'section-card';
    div.innerHTML = `
      <div class="sec-header">
        <div class="sec-title">
          ${SECTIONS[sec]}
          <span class="sec-count">${checkedCount}/${secItems.length} ${collectedCount>0?'· 🧺'+collectedCount:''}</span>
        </div>
        <button class="sec-check-all" onclick="checkAllSec(${sec})">${secItems.every(i=>i.checked)?'בטל':'סמן הכל'}</button>
      </div>
      <div class="items-list">
        ${secItems.map(item=>`
          <div class="item ${item.checked?'checked':''} ${item.collected?'collected':''}">
            <div class="cb" onclick="toggle(${item.idx})"></div>
            <div class="item-name" onclick="toggle(${item.idx})">${item.name}</div>
            <div class="item-actions">
              <div class="collect-btn ${item.collected?'done':''}" onclick="toggleCollect(${item.idx})" title="נאסף">
                ${item.collected?'✓':'🧺'}
              </div>
              <button class="edit-btn" onclick="openEdit(${item.idx})" title="עריכה">✏️</button>
              <button class="del-btn" onclick="deleteItem(${item.idx})" title="מחק">🗑</button>
            </div>
          </div>
        `).join('')}
      </div>
    `;
    listEl.appendChild(div);
  });

  // Stats
  const total = items.length;
  const checked = items.filter(i=>i.checked).length;
  const collected = items.filter(i=>i.collected).length;
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-checked').textContent = checked;
  document.getElementById('st-left').textContent = total - checked;
  document.getElementById('st-collected').textContent = collected;

  if(cartMode) renderCart();
}

// ── RENDER CART ────────────────────────────────────────────────
function renderCart() {
  const cartEl = document.getElementById('cart-view');
  const checked = items.filter(i=>i.checked);
  if(!checked.length) {
    cartEl.innerHTML = '<div style="text-align:center;padding:40px;color:#81c784;font-size:16px;font-weight:700;background:#fff;border-radius:14px">🛒 העגלה ריקה<br><span style="font-size:13px;opacity:.7">סמן מוצרים ברשימה</span></div>';
    return;
  }
  const secs = {};
  items.forEach((item, gi) => {
    if(!item.checked) return;
    if(!secs[item.sec]) secs[item.sec]=[];
    secs[item.sec].push({...item, _gi: gi});
  });
  // Find global index for each item
  cartEl.innerHTML = Object.keys(secs).sort((a,b)=>+a-+b).map(sec=>`
    <div class="cart-section">
      <div class="cart-sec-title">${SECTIONS[sec]}</div>
      ${secs[sec].map(i=>{
        const gi = i._gi;
        return `
        <div class="cart-item ${i.collected?'collected-item':''}" id="ci-${gi}">
          <div class="ci-dot"></div>
          <span style="flex:1;font-size:14px;font-weight:600">${i.name}</span>
          <button onclick="cartCollect(${gi})" style="
            width:34px;height:34px;border-radius:50%;border:2px solid ${i.collected?'#0097a7':'#b2ebf2'};
            background:${i.collected?'#0097a7':'#fff'};color:${i.collected?'#fff':'#0097a7'};
            font-size:14px;font-weight:900;cursor:pointer;flex-shrink:0;
            display:flex;align-items:center;justify-content:center"
            title="${i.collected?'מסיר סימון':'סמן כנאסף'}">
            ${i.collected?'✓':'🧺'}
          </button>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

// ── CLEAR / RESET ──────────────────────────────────────────────
function cartCollect(idx) {
  items[idx].collected = !items[idx].collected;
  save();
  renderCart();
  // Also update stats
  const collected = items.filter(i=>i.collected).length;
  document.getElementById('st-collected').textContent = collected;
}

function clearAll() {
  if(!items.some(i=>i.checked||i.collected)) return;
  if(!confirm('לנקות את כל הסימונים?')) return;
  items.forEach(i=>{i.checked=false;i.collected=false;});
  save(); render(); toast('🗑️ נוקה');
}
function resetAll() {
  if(!confirm('לאפס את הרשימה לברירת מחדל? מוצרים שהוספת יימחקו!')) return;
  items = ALL_ITEMS.map(i=>({...i,checked:false,collected:false}));
  save(); render(); toast('↺ אופס');
}

// ── SHARE ──────────────────────────────────────────────────────
function shareList() {
  const checked = items.filter(i=>i.checked);
  if(!checked.length) { alert('סמן מוצרים קודם!'); return; }
  const secs = {};
  checked.forEach(i=>{ if(!secs[i.sec]) secs[i.sec]=[]; secs[i.sec].push(i); });
  let txt = '🛒 רשימת קניות:\n\n';
  Object.keys(secs).sort((a,b)=>+a-+b).forEach(s=>{
    txt += SECTIONS[s] + ':\n';
    secs[s].forEach(i=>txt+=(i.collected?'✓ ':'• ')+i.name+'\n');
    txt += '\n';
  });
  if(navigator.share) { navigator.share({title:'רשימת קניות',text:txt}); }
  else { navigator.clipboard?.writeText(txt).then(()=>toast('📋 הועתק!')); }
}

// ── TOAST ──────────────────────────────────────────────────────
let toastT;
function toast(m) {
  const el=document.getElementById('toast');
  el.textContent=m; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2500);
}

// ── KEYBOARD ───────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  if(e.key==='Enter') {
    if(document.getElementById('add-modal').classList.contains('open')) confirmAdd();
    if(document.getElementById('edit-modal').classList.contains('open')) confirmEdit();
  }
  if(e.key==='Escape') {
    closeModal('add-modal'); closeModal('edit-modal');
  }
});

// ── INIT ───────────────────────────────────────────────────────
render();
</script>
</body>
</html>
