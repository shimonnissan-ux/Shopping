<script>
window.addEventListener('DOMContentLoaded',()=>{
  const m={
    name:"רשימת קניות",short_name:"קניות",
    start_url:".",display:"standalone",
    background_color:"#2e7d32",theme_color:"#2e7d32",
    icons:[
      {src:"bg.jpg",sizes:"192x192",type:"image/png",purpose:"any maskable"},
      {src:"bg.jpg",sizes:"512x512",type:"image/png",purpose:"any maskable"}
    ]
  };
  const url=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}));
  document.getElementById('mf-shop').href=url;
  let dp;
  window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;
    const b=document.getElementById('inst-btn');if(b)b.style.display='flex';});
  window._install=()=>{if(dp)dp.prompt();};
});
</script>
<title>🛒 רשימת קניות</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  background-image: url("bg.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  font-family:Heebo,sans-serif;direction:rtl;color:#1b5e20;min-height:100vh;padding-bottom:80px
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.82);
  z-index:0;
  pointer-events:none;
}
#hdr,#stats,#sec-filter,#list,#cart-view,#bottom{position:relative;z-index:1;}

/* HEADER */
#hdr{background:linear-gradient(135deg,#2e7d32,#1b5e20);padding:12px 16px;
  position:sticky;top:0;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.2)}
#hdr h1{color:#fff;font-size:20px;font-weight:900;margin-bottom:8px;display:flex;align-items:center;gap:8px}
#search{width:100%;padding:8px 14px;border-radius:20px;border:none;
  font-family:Heebo;font-size:15px;background:rgba(255,255,255,.15);
  color:#fff;outline:none;placeholder-color:#fff}
#search::placeholder{color:rgba(255,255,255,.6)}
#search:focus{background:rgba(255,255,255,.25)}

/* STATS BAR */
#stats{background:#fff;padding:10px 16px;display:flex;gap:12px;
  align-items:center;border-bottom:1px solid #c8e6c9;flex-wrap:wrap}
.stat{font-size:13px;font-weight:600;color:#388e3c}
.stat span{font-size:16px;font-weight:900;color:#1b5e20}
#show-cart-btn{margin-right:auto;background:#2e7d32;color:#fff;border:none;
  border-radius:20px;padding:6px 16px;font-family:Heebo;font-size:13px;
  font-weight:700;cursor:pointer;transition:all .2s}
#show-cart-btn:hover{background:#1b5e20}
#show-cart-btn.active{background:#f44336}

/* SECTION FILTER */
#sec-filter{padding:10px 16px;display:flex;gap:8px;overflow-x:auto;
  background:#fff;border-bottom:1px solid #c8e6c9;scroll-behavior:smooth}
#sec-filter::-webkit-scrollbar{display:none}
.sf-btn{background:#e8f5e9;border:1.5px solid #a5d6a7;color:#2e7d32;
  border-radius:20px;padding:5px 12px;font-family:Heebo;font-size:12px;
  font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.sf-btn.active{background:#2e7d32;color:#fff;border-color:#1b5e20}
.sf-btn:hover{background:#c8e6c9}

/* SECTIONS */
#list{padding:12px 14px;display:grid;gap:12px}
.section-card{background:#fff;border-radius:14px;overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sec-header{padding:10px 16px;background:#e8f5e9;display:flex;
  align-items:center;justify-content:space-between;cursor:pointer;
  border-bottom:1px solid #c8e6c9}
.sec-title{font-size:14px;font-weight:900;color:#1b5e20;display:flex;align-items:center;gap:6px}
.sec-count{font-size:12px;color:#388e3c;font-weight:600}
.sec-check-all{background:#2e7d32;color:#fff;border:none;border-radius:10px;
  padding:3px 10px;font-family:Heebo;font-size:11px;font-weight:700;cursor:pointer}

/* ITEMS */
.items-list{padding:4px 0}
.item{display:flex;align-items:center;padding:10px 16px;gap:12px;
  border-bottom:1px solid #f1f8e9;transition:background .15s;cursor:pointer}
.item:last-child{border-bottom:none}
.item:hover{background:#f9fbe7}
.item.checked{background:#f1f8e9;opacity:.65}
.item.checked .item-name{text-decoration:line-through;color:#81c784}
.cb{width:22px;height:22px;border-radius:6px;border:2px solid #a5d6a7;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:#fff;transition:all .15s}
.item.checked .cb{background:#2e7d32;border-color:#2e7d32}
.cb::after{content:'✓';color:#fff;font-size:13px;font-weight:900;display:none}
.item.checked .cb::after{display:block}
.item-name{font-size:14px;font-weight:600;flex:1;line-height:1.3}

/* CART VIEW */
#cart-view{display:none;padding:12px 14px}
#cart-view.show{display:block}
#list.hide{display:none}
.cart-section{background:#fff;border-radius:14px;margin-bottom:12px;overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.06)}
.cart-sec-title{padding:10px 16px;background:#e8f5e9;font-size:14px;
  font-weight:900;color:#1b5e20}
.cart-item{padding:10px 16px;border-bottom:1px solid #f1f8e9;
  font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.cart-item:last-child{border-bottom:none}
.cart-item::before{content:'✓';color:#2e7d32;font-weight:900;font-size:14px}

/* BOTTOM BAR */
#bottom{position:fixed;bottom:0;right:0;left:0;background:#fff;
  padding:10px 16px;display:flex;gap:8px;border-top:1px solid #c8e6c9;
  box-shadow:0 -2px 8px rgba(0,0,0,.08)}
.bot-btn{flex:1;padding:10px;border:none;border-radius:10px;font-family:Heebo;
  font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
#btn-clear{background:#ffebee;color:#c62828}
#btn-reset{background:#e8f5e9;color:#2e7d32}
#btn-share{background:#2e7d32;color:#fff}
</style>
</head>

let items = JSON.parse(localStorage.getItem('shopping_v1') || 'null') || ALL_ITEMS.map(i=>({...i}));
let activeSec = -1;
let cartMode = false;

function save() { localStorage.setItem('shopping_v1', JSON.stringify(items)); }

function toggle(idx) {
  items[idx].checked = !items[idx].checked;
  save(); render();
}

function checkAllSec(sec) {
  const secItems = items.filter(i=>i.sec===sec);
  const allChecked = secItems.every(i=>i.checked);
  items.forEach((item,i)=>{ if(item.sec===sec) items[i].checked=!allChecked; });
  save(); render();
}

function filterSec(sec) {
  activeSec = sec;
  document.querySelectorAll('.sf-btn').forEach(b=>{
    b.classList.toggle('active', +b.dataset.sec===sec);
  });
  render();
}

function filterItems() { render(); }

function toggleCart() {
  cartMode = !cartMode;
  const btn = document.getElementById('show-cart-btn');
  btn.textContent = cartMode ? '📋 הצג הכל' : '🛒 הצג עגלה';
  btn.classList.toggle('active', cartMode);
  document.getElementById('list').classList.toggle('hide', cartMode);
  document.getElementById('cart-view').classList.toggle('show', cartMode);
  if(cartMode) renderCart();
}

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const listEl = document.getElementById('list');
  
  // Group by section
  const secs = {};
  items.forEach((item, idx) => {
    if(activeSec !== -1 && item.sec !== activeSec) return;
    if(q && !item.name.toLowerCase().includes(q)) return;
    if(!secs[item.sec]) secs[item.sec] = [];
    secs[item.sec].push({...item, idx});
  });

  listEl.innerHTML = '';
  Object.keys(secs).sort((a,b)=>+a-+b).forEach(sec => {
    const secItems = secs[sec];
    const checkedCount = secItems.filter(i=>i.checked).length;
    const div = document.createElement('div');
    div.className = 'section-card';
    div.innerHTML = `
      <div class="sec-header" onclick="toggleSec(${sec})">
        <div class="sec-title">
          ${SECTIONS[sec]}
          <span class="sec-count">${checkedCount}/${secItems.length}</span>
        </div>
        <button class="sec-check-all" onclick="event.stopPropagation();checkAllSec(${sec})">
          ${secItems.every(i=>i.checked)?'בטל הכל':'סמן הכל'}
        </button>
      </div>
      <div class="items-list" id="sec-${sec}">
        ${secItems.map(item=>`
          <div class="item ${item.checked?'checked':''}" onclick="toggle(${item.idx})">
            <div class="cb"></div>
            <div class="item-name">${item.name}</div>
          </div>
        `).join('')}
      </div>
    `;
    listEl.appendChild(div);
  });

  // Update stats
  const total = items.length;
  const checked = items.filter(i=>i.checked).length;
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-checked').textContent = checked;
  document.getElementById('st-left').textContent = total - checked;

  if(cartMode) renderCart();
}

function renderCart() {
  const cartEl = document.getElementById('cart-view');
  const checked = items.filter(i=>i.checked);
  if(!checked.length) {
    cartEl.innerHTML = '<div style="text-align:center;padding:40px;color:#81c784;font-size:16px;font-weight:700">🛒 העגלה ריקה<br>סמן מוצרים ברשימה</div>';
    return;
  }
  const secs = {};
  checked.forEach(item => {
    if(!secs[item.sec]) secs[item.sec]=[];
    secs[item.sec].push(item);
  });
  cartEl.innerHTML = Object.keys(secs).sort((a,b)=>+a-+b).map(sec=>`
    <div class="cart-section">
      <div class="cart-sec-title">${SECTIONS[sec]}</div>
      ${secs[sec].map(i=>`<div class="cart-item">${i.name}</div>`).join('')}
    </div>
  `).join('');
}

function clearChecked() {
  if(!items.some(i=>i.checked)) return;
  if(!confirm('לנקות את כל המסומנים?')) return;
  items.forEach(i=>i.checked=false);
  save(); render();
}

function resetAll() {
  if(!confirm('לאפס את כל הרשימה?')) return;
  items = ALL_ITEMS.map(i=>({...i,checked:false}));
  save(); render();
}

function shareList() {
  const checked = items.filter(i=>i.checked);
  if(!checked.length) { alert('סמן מוצרים קודם!'); return; }
  const secs = {};
  checked.forEach(i=>{ if(!secs[i.sec]) secs[i.sec]=[]; secs[i.sec].push(i.name); });
  let txt = '🛒 רשימת קניות:\n\n';
  Object.keys(secs).sort((a,b)=>+a-+b).forEach(s=>{
    txt += SECTIONS[s]+':\n';
    secs[s].forEach(n=>txt+='• '+n+'\n');
    txt+='\n';
  });
  if(navigator.share) { navigator.share({title:'רשימת קניות',text:txt}); }
  else { navigator.clipboard.writeText(txt); alert('הועתק!'); }
}

function toggleSec(sec) {
  const el = document.getElementById('sec-'+sec);
  if(el) el.style.display = el.style.display==='none'?'':'none';
}

render();
